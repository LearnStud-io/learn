<!doctype html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111113;
    font-family: system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }
  canvas { position: absolute; inset: 0; }
  .label {
    position: relative;
    z-index: 1;
    text-align: center;
    color: #a1a1aa;
    font-size: 12px;
    letter-spacing: 0.05em;
  }
  .label span {
    display: block;
    font-size: 28px;
    font-weight: 700;
    color: #818cf8;
    margin-bottom: 6px;
    letter-spacing: -0.02em;
  }
</style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="label"><span>vis</span>interactive visualisation</div>
  <script>
    const c = document.getElementById('c')
    const ctx = c.getContext('2d')
    let w, h, pts

    function resize() {
      w = c.width = window.innerWidth
      h = c.height = window.innerHeight
    }

    function init() {
      pts = Array.from({ length: 40 }, () => ({
        x: Math.random() * w,
        y: Math.random() * h,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4,
        r: Math.random() * 2 + 1,
      }))
    }

    function draw() {
      ctx.clearRect(0, 0, w, h)
      for (let i = 0; i < pts.length; i++) {
        const a = pts[i]
        a.x += a.vx; a.y += a.vy
        if (a.x < 0 || a.x > w) a.vx *= -1
        if (a.y < 0 || a.y > h) a.vy *= -1
        for (let j = i + 1; j < pts.length; j++) {
          const b = pts[j]
          const dx = b.x - a.x, dy = b.y - a.y
          const d = Math.sqrt(dx * dx + dy * dy)
          if (d < 120) {
            ctx.beginPath()
            ctx.moveTo(a.x, a.y)
            ctx.lineTo(b.x, b.y)
            ctx.strokeStyle = `rgba(99,102,241,${(1 - d / 120) * 0.4})`
            ctx.lineWidth = 1
            ctx.stroke()
          }
        }
        ctx.beginPath()
        ctx.arc(a.x, a.y, a.r, 0, Math.PI * 2)
        ctx.fillStyle = '#6366f1'
        ctx.globalAlpha = 0.7
        ctx.fill()
        ctx.globalAlpha = 1
      }
      requestAnimationFrame(draw)
    }

    resize()
    init()
    draw()
    window.addEventListener('resize', () => { resize(); init() })
  </script>
</body>
</html>
