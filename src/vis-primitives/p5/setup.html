<!-- Standard p5.js vis shell — copy and fill in the blanks.
     iframe viewport: width 100%, height 280px.
     Buttons are absolute-positioned over the canvas (z-index:10).
     Canvas fills the remaining space below them. -->

<!doctype html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#080d14; font-family:system-ui,sans-serif; height:100vh; overflow:hidden; }

/* Toggle buttons — absolute over canvas */
.btns {
  display:flex; justify-content:center; gap:8px;
  padding:8px 0; position:absolute; top:0; left:0; right:0; z-index:10;
}
.btn {
  padding:5px 16px; border-radius:6px; border:1.5px solid #334155;
  background:transparent; color:#94a3b8; font-size:12px; cursor:pointer;
  font-family:system-ui,sans-serif; transition:all 0.15s;
}
.btn.active { background:#1e293b; border-color:#3b82f6; color:#e2e8f0; }
</style>
</head>
<body>

<div class="btns">
  <button class="btn active" id="b1" onclick="setPair(0)">option A</button>
  <button class="btn"        id="b2" onclick="setPair(1)">option B</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<!-- paste palette.js and animate.js contents here -->
<script>

// ── state ────────────────────────────────────────────────────────────────────
// ... your data and animation state here

function setPair(i) {
  document.getElementById('b1').className = 'btn' + (i === 0 ? ' active' : '')
  document.getElementById('b2').className = 'btn' + (i === 1 ? ' active' : '')
  // snapshot + kick off animation
}

// ── p5 sketch ────────────────────────────────────────────────────────────────
new p5(s => {
  s.setup = () => {
    s.createCanvas(s.windowWidth, 278).parent(document.body)
    s.textFont('system-ui')
  }

  s.draw = () => {
    s.background(...P.bg)

    // advance animation
    if (animT < 1) animT = Math.min(1, animT + ANIM_SPEED)
    const e = easeInOut(animT)
    // ... lerp values

    // ... draw

    // interaction hint — always last
    s.noStroke()
    s.fill(45, 58, 80)
    s.textSize(9)
    s.textAlign(s.CENTER, s.BOTTOM)
    s.text('← toggle above  •  short hint about interaction', s.width / 2, s.height - 3)
  }

  s.windowResized = () => s.resizeCanvas(s.windowWidth, 278)
})
</script>
</body>
</html>
